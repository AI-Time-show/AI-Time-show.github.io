<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .task-manager {
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            padding: 20px;
            width: 350px;
        }
        .task-manager h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .input-group input {
            width: calc(100% - 10px);
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .task-list {
            margin-top: 20px;
        }
        .task-list ul {
            list-style: none;
            padding-left: 0;
        }
        .task-list li {
            background: #f1f1f1;
            margin: 5px 0;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
        }
        .btn-container {
            text-align: center;
            margin-top: 15px;
        }
        button {
            background-color: #007bff;
            color: #ffffff;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
    <!-- Firebase Scripts -->
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Function to add a new task
        async function addTaskToFirestore(task) {
            try {
                const docRef = await addDoc(collection(db, "tasks"), task);
                console.log("Task added with ID: ", docRef.id);
                loadTasksFromFirestore(); // Refresh the tasks after adding
            } catch (e) {
                console.error("Error adding task: ", e);
            }
        }

        // Function to load tasks from Firestore
        async function loadTasksFromFirestore() {
            const tasksListElement = document.getElementById('task-list');
            tasksListElement.innerHTML = ''; // Clear the current list

            try {
                const querySnapshot = await getDocs(collection(db, "tasks"));
                querySnapshot.forEach((doc) => {
                    const task = doc.data();
                    const listItem = document.createElement('li');
                    listItem.innerHTML = `${task.title} [Importance: ${task.importance}, Time: ${task.estimatedTime}, Deadline: ${task.deadline ? task.deadline : 'N/A'}] 
                        <button onclick="deleteTask('${doc.id}')">Complete</button>`;
                    tasksListElement.appendChild(listItem);
                });
            } catch (e) {
                console.error("Error loading tasks: ", e);
            }
        }

        // Function to delete a task from Firestore
        async function deleteTask(taskId) {
            try {
                await deleteDoc(doc(db, "tasks", taskId));
                console.log("Task deleted with ID: ", taskId);
                loadTasksFromFirestore(); // Refresh the tasks after deleting
            } catch (e) {
                console.error("Error deleting task: ", e);
            }
        }

        // Function to be called when adding a task from the form
        function addTask() {
            const title = document.getElementById('task-title').value;
            const importance = document.getElementById('task-importance').value;
            const estimatedTime = document.getElementById('task-time').value;
            const deadline = document.getElementById('task-deadline').value;

            if (!title || !importance || !estimatedTime) {
                alert("Please fill in all fields correctly.");
                return;
            }

            const task = {
                title,
                importance: parseInt(importance),
                estimatedTime,
                deadline
            };

            addTaskToFirestore(task);
            clearInputs();
        }

        // Function to clear input fields
        function clearInputs() {
            document.getElementById('task-title').value = '';
            document.getElementById('task-importance').value = '';
            document.getElementById('task-time').value = '';
            document.getElementById('task-deadline').value = '';
        }

        // Load tasks from Firestore when the document is ready
        document.addEventListener("DOMContentLoaded", () => {
            loadTasksFromFirestore();
        });
    </script>
</head>
<body>
    <div class="task-manager">
        <h1>Task Manager</h1>
        <div class="input-group">
            <label for="task-title">Task Title</label>
            <input type="text" id="task-title">
        </div>
        <div class="input-group">
            <label for="task-importance">Importance (1-10)</label>
            <input type="number" id="task-importance" min="1" max="10">
        </div>
        <div class="input-group">
            <label for="task-time">Estimated Time (HH:MM)</label>
            <input type="text" id="task-time" placeholder="e.g. 02:30">
        </div>
        <div class="input-group">
            <label for="task-deadline">Deadline (YYYY-MM-DD)</label>
            <input type="date" id="task-deadline">
        </div>
        <div class="btn-container">
            <button onclick="addTask()">Add Task</button>
            <button onclick="sortTasks()">Sort Tasks</button>
        </div>
        <div class="task-list">
            <ul id="task-list"></ul>
        </div>
    </div>
</body>
</html>
