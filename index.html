<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .task-manager {
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            padding: 20px;
            width: 350px;
        }
        .task-manager h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .input-group input {
            width: calc(100% - 10px);
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .task-list {
            margin-top: 20px;
        }
        .task-list ul {
            list-style: none;
            padding-left: 0;
        }
        .task-list li {
            background: #f1f1f1;
            margin: 5px 0;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
        }
        .btn-container {
            text-align: center;
            margin-top: 15px;
        }
        button {
            background-color: #007bff;
            color: #ffffff;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="task-manager">
        <h1>Task Manager</h1>
        <div class="input-group">
            <label for="task-title">Task Title</label>
            <input type="text" id="task-title">
        </div>
        <div class="input-group">
            <label for="task-importance">Importance (1-10)</label>
            <input type="number" id="task-importance" min="1" max="10">
        </div>
        <div class="input-group">
            <label for="task-time">Estimated Time (HH:MM)</label>
            <input type="text" id="task-time" placeholder="e.g. 02:30">
        </div>
        <div class="input-group">
            <label for="task-deadline">Deadline (YYYY-MM-DD)</label>
            <input type="date" id="task-deadline">
        </div>
        <div class="btn-container">
            <button onclick="addTask()">Add Task</button>
            <button onclick="sortTasks()">Sort Tasks</button>
        </div>
        <div class="task-list">
            <ul id="task-list"></ul>
        </div>
    </div>
    
    <script>
        let tasks = [];

        document.addEventListener("DOMContentLoaded", () => {
            loadTasks();
        });

        function addTask() {
            const title = document.getElementById('task-title').value;
            const importance = document.getElementById('task-importance').value;
            const estimatedTime = document.getElementById('task-time').value;
            const deadline = document.getElementById('task-deadline').value;

            if (!title || !importance || !estimatedTime) {
                alert("Please fill in all fields correctly.");
                return;
            }

            tasks.push({
                title,
                importance: parseInt(importance),
                estimatedTime,
                deadline
            });
            saveTasks();
            displayTasks();
            clearInputs();
        }

        function displayTasks() {
            const taskList = document.getElementById('task-list');
            taskList.innerHTML = '';
            tasks.forEach((task, index) => {
                const listItem = document.createElement('li');
                listItem.innerHTML = `${task.title} [Importance: ${task.importance}, Time: ${task.estimatedTime}, Deadline: ${task.deadline ? task.deadline : 'N/A'}] <button onclick="removeTask(${index})">Complete</button>`;
                taskList.appendChild(listItem);
            });
        }

        function removeTask(index) {
            tasks.splice(index, 1);
            saveTasks();
            displayTasks();
        }

        function clearInputs() {
            document.getElementById('task-title').value = '';
            document.getElementById('task-importance').value = '';
            document.getElementById('task-time').value = '';
            document.getElementById('task-deadline').value = '';
        }

        function sortTasks() {
            tasks.sort((a, b) => calculateScore(b) - calculateScore(a));
            saveTasks();
            displayTasks();
        }

        function calculateScore(task) {
            const timeParts = task.estimatedTime.split(":");
            const timeInMinutes = parseInt(timeParts[0]) * 60 + parseInt(timeParts[1]);
            const importanceScore = task.importance / timeInMinutes;
            let deadlineScore = 1;

            if (task.deadline) {
                const deadlineTime = new Date(task.deadline).getTime();
                const now = new Date().getTime();
                const timeToDeadline = (deadlineTime - now) / 60000; // time in minutes
                const x = timeToDeadline / Math.max(timeInMinutes, 1);
                deadlineScore = 18 / (1 + Math.exp(x / 2)) + 1;
            }
            
            return importanceScore * deadlineScore;
        }

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function loadTasks() {
            const savedTasks = localStorage.getItem('tasks');
            if (savedTasks) {
                tasks = JSON.parse(savedTasks);
                displayTasks();
            }
        }
    </script>
</body>
</html>
