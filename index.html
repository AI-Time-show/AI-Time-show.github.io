<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Interactive Resume</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Info Section -->
    <div id="info">
        <img src="images/your-face.jpg" alt="Your Face" id="face-image">
        <h1>Your Name</h1>
        <p>Contact Info: <a href="mailto:you@example.com">you@example.com</a></p>
        <p>Brief Summary: A short introduction about yourself.</p>
    </div>

    <!-- Canvas for Three.js -->
    <canvas id="canvas"></canvas>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.3/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.3/ScrollTrigger.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
